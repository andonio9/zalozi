<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

.cp-stat-l{font-size:9px;color:rgba(255,255,255,.3);margin-bottom:3px}

.lc-live{display:flex;align-items:center;gap:4px;font-size:10px;color:#f87171;font-weight:600}

.lc-score{display:flex;justify-content:space-between;align-items:center}

</style>
</head>

<script>
var CLIENTS = [];
var selClientForUpload = null;
var curClient = null;
var imgFile = null;
var curResult = null;
var ws;

var COLORS = ['#3b82f6','#f59e0b','#f97316','#ef4444','#8b5cf6','#06b6d4','#10b981','#ec4899','#f43f5e','#84cc16'];

// WebSocket
function connectWS() {
  try {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host);
    ws.onclose = function() { setTimeout(connectWS, 3000); };
    ws.onerror = function() {};
    ws.onmessage = function(e) {
      try {
        var d = JSON.parse(e.data);
        var types = ['new_slip','slip_graded','slip_updated','slip_deleted','client_added','client_updated','client_deleted','client_settled'];
        if (types.indexOf(d.type) !== -1) {
          loadDashboard();
          if (curClient && String(d.client_id) === String(curClient.id)) {
            loadClientSlips(curClient.id);
          }
        }
      } catch(ex) {}
    };
  } catch(err) { setTimeout(connectWS, 3000); }
}
connectWS();

// Pages
function showPage(p) {
  var pages = ['upload','live','history','client'];
  for (var i = 0; i < pages.length; i++) {
    var x = pages[i];
    document.getElementById('pg-'+x).className = 'page' + (x === p ? ' act' : '');
    var nb = document.getElementById('nb-'+x);
    if (nb) nb.className = 'nb' + (x === p ? ' act' : '');
  }
  if (p === 'live') loadLive();
  if (p === 'history') loadHistory();
}

function showEl(id, v) {
  document.getElementById(id).style.display = v ? 'block' : 'none';
}

// Dashboard
function loadDashboard() {
  fetch('/api/clients').then(function(r) { return r.json(); }).then(function(data) {
    CLIENTS = data;
    var totalAmt = 0, totalSlips = 0, totalWins = 0, totalLosses = 0;
    for (var i = 0; i < CLIENTS.length; i++) {
      totalAmt += Number(CLIENTS[i].balance || 0);
      totalSlips += Number(CLIENTS[i].total_slips || 0);
      totalWins += Number(CLIENTS[i].wins || 0);
      totalLosses += Number(CLIENTS[i].losses || 0);
    }
    var tot = totalWins + totalLosses;
    var amtEl = document.getElementById('total-amt');
    amtEl.textContent = (totalAmt >= 0 ? '+' : '') + Math.round(totalAmt) + ' лв.';
    amtEl.style.color = totalAmt >= 0 ? '#4ade80' : '#f87171';
    document.getElementById('total-slips').textContent = totalSlips;
    document.getElementById('win-rate').textContent = tot > 0 ? Math.round(totalWins/tot*100) + '%' : '—';
    document.getElementById('total-losses').textContent = totalLosses;
    renderClients();
    updateSelPills();
    loadMainChart();
    loadExposure();
  }).catch(function() {});
}

function loadExposure() {
  fetch('/api/exposure').then(function(r) { return r.json(); }).then(function(data) {
    var total = 0;
    for (var i = 0; i < data.length; i++) total += Number(data[i].exposure || 0);
    document.getElementById('exposure').textContent = Math.round(total) + ' лв.';
  }).catch(function() {});
}

function renderClients() {
  var grid = document.getElementById('clients-grid');
  grid.innerHTML = '';
  for (var i = 0; i < CLIENTS.length; i++) {
    var c = CLIENTS[i];
    var bal = Number(c.balance || 0);
    var tot = Number(c.total || 0);
    var cls = bal > 0 ? 'g' : bal < 0 ? 'r' : '';
    var nameColor = bal > 0 ? '#4ade80' : bal < 0 ? '#f87171' : 'rgba(255,255,255,.3)';
    var div = document.createElement('div');
    div.className = 'cc' + (cls ? ' ' + cls : '');
    div.innerHTML = '<div class="cc-top">' +
      '<div class="cc-name" style="color:' + nameColor + '">' + c.name + '</div>' +
      '<span class="cc-badge ' + (cls || 'n') + '">' + c.wins + 'W·' + c.losses + 'L</span>' +
      '</div>' +
      '<div class="cc-amt" style="color:' + nameColor + '">' + (bal >= 0 ? '+' : '') + Math.round(bal) + ' лв.</div>' +
      '<div class="cc-bar-bg"><div class="cc-bar-fill" style="width:' + Math.min(100, Math.abs(bal)/10) + '%;background:' + (bal >= 0 ? '#4ade80' : '#f87171') + ';opacity:.3"></div></div>' +
      '<div class="cc-week">Тотал: <span style="color:' + (tot >= 0 ? '#4ade80' : '#f87171') + '">' + (tot >= 0 ? '+' : '') + Math.round(tot) + ' лв.</span></div>' +
      '<button class="cc-btn" onclick="event.stopPropagation();confirmSettle(' + c.id + ')">Нулирай сметка</button>';
    (function(client) {
      div.onclick = function() { openClientPage(client); };
    })(c);
    grid.appendChild(div);
  }
}

function loadMainChart() {
  fetch('/api/chart').then(function(r) { return r.json(); }).then(function(data) {
    renderBars('main-chart', data);
  }).catch(function() {});
}

function renderBars(id, data) {
  var el = document.getElementById(id);
  if (!el) return;
  if (!data || !data.length) {
    el.innerHTML = '<div style="color:rgba(255,255,255,.3);font-size:11px;text-align:center;width:100%">Няма данни</div>';
    return;
  }
  var max = 1;
  for (var i = 0; i < data.length; i++) {
    var v = Math.abs(Number(data[i].amount || 0));
    if (v > max) max = v;
  }
  var html = '';
  for (var i = 0; i < data.length; i++) {
    var amt = Number(data[i].amount || 0);
    var h = Math.max(2, Math.round((Math.abs(amt)/max)*48));
    var cls = amt >= 0 ? 'g' : 'r';
    var day = data[i].date ? String(data[i].date).slice(8) : '';
    html += '<div class="bar-col"><div class="bar ' + cls + '" style="height:' + h + 'px"></div><div class="bar-d">' + day + '</div></div>';
  }
  el.innerHTML = html;
}

// Client page
function openClientById(id) {
  var c = null;
  for (var i = 0; i < CLIENTS.length; i++) {
    if (CLIENTS[i].id === id) { c = CLIENTS[i]; break; }
  }
  if (c) openClientPage(c);
}

function openClientPage(c) {
  curClient = c;
  showPage('client');
  var bal = Number(c.balance || 0);
  var tot = Number(c.total || 0);
  document.getElementById('cp-name').textContent = c.name;
  document.getElementById('cp-name').style.color = bal >= 0 ? '#4ade80' : '#f87171';
  document.getElementById('cp-bal').textContent = (bal >= 0 ? '+' : '') + Math.round(bal) + ' лв.';
  document.getElementById('cp-bal').style.color = bal >= 0 ? '#4ade80' : '#f87171';
  document.getElementById('cp-total').textContent = (tot >= 0 ? '+' : '') + Math.round(tot) + ' лв.';
  document.getElementById('cp-total').style.color = tot >= 0 ? '#4ade80' : '#f87171';
  document.getElementById('cp-slips').textContent = c.total_slips || 0;
  fetch('/api/clients/' + c.id + '/chart').then(function(r) { return r.json(); }).then(function(data) {
    renderBars('client-chart', data);
  }).catch(function() {});
  loadClientSlips(c.id);
}

function loadClientSlips(clientId) {
  fetch('/api/clients/' + clientId + '/slips').then(function(r) { return r.json(); }).then(function(slips) {
    var el = document.getElementById('client-slips');
    if (!slips || !slips.length) {
      el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.3);padding:30px">Няма фишове</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < slips.length; i++) {
      var s = slips[i];
      var isP = s.is_profit;
      var isPend = s.result === 'PENDING';
      var amtColor = isPend ? '#fbbf24' : isP ? '#4ade80' : '#f87171';
      var amtText = isPend ? '⏳' : ((isP ? '+' : '-') + Math.round(Number(s.our_amount)) + ' лв.');
      var tagCls = isPend ? 'p' : isP ? 'g' : 'r';
      var tagTxt = isPend ? 'Изчакване' : isP ? 'Загубен фиш' : 'Спечелен фиш';
      var ms = '';
      var matches = s.matches || [];
      for (var j = 0; j < matches.length; j++) {
        var m = matches[j];
        var icon = m.result === 'WIN' ? ' ❌' : m.result === 'LOSS' ? ' ✅' : m.result === 'LIVE' ? ' 🔴' : ' ⏳';
        if (ms) ms += ' · ';
        ms += (m.display || '') + icon;
      }
      var dateStr = s.slip_date || (s.created_at ? String(s.created_at).slice(0,10) : '');
      html += '<div class="slip-item" id="slip-' + s.id + '">' +
        '<div class="slip-top">' +
        '<div style="font-size:11px;color:rgba(255,255,255,.4)">' + dateStr + ' · x' + s.total_odds + '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
        '<div style="font-size:16px;font-weight:500;color:' + amtColor + '">' + amtText + '</div>' +
        '<div class="slip-del" onclick="deleteSlip(' + s.id + ')">🗑</div>' +
        '</div></div>' +
        '<div class="slip-matches">' + (ms || '—') + '</div>' +
        '<div class="slip-bottom">' +
        '<div class="slip-meta">' + Math.round(Number(s.stake)) + ' лв. залог</div>' +
        '<span class="slip-tag ' + tagCls + '">' + tagTxt + '</span>' +
        '</div>';
      if (s.image_path && s.image_path !== 'null') {
        html += '<img src="' + s.image_path + '" class="slip-img" loading="lazy" onclick="toggleImgSize(this)" alt="фиш">';
      }
      html += '</div>';
    }
    el.innerHTML = html;
  }).catch(function() {});
}

function toggleImgSize(img) {
  img.style.maxHeight = img.style.maxHeight === 'none' ? '200px' : 'none';
}

function deleteSlip(id) {
  if (!confirm('Изтрий фиша?')) return;
  fetch('/api/slips/' + id, {method:'DELETE'}).then(function() {
    var el = document.getElementById('slip-' + id);
    if (el) el.remove();
    loadDashboard();
  });
}

function deleteClient() {
  if (!curClient) return;
  if (!confirm('Изтрий клиент ' + curClient.name + '? Всички фишове ще се изтрият.')) return;

function openSettle() {

    '</div>' +
    '<div class="field"><label>Бележка</label><input id="settle-notes" placeholder="Платено в брой..."></div>' +

    '</div>'

function saveNewClient() {

  var color = selColor ? selColor.getAttribute('data-color') : '#3b82f6';

function selectColor(el, containerId) {

// Modal
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

// Upload
document.getElementById('fin').addEventListener('change', function(e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  imgFile = file;
  var reader = new FileReader();
  reader.onload = function(ev) {
    document.getElementById('prev-img').src = ev.target.result;
    showEl('u-box', false);
    showEl('u-prev', true);
    showEl('u-proc', false);
    showEl('u-res', false);
    showEl('u-err', false);
    if (!selClientForUpload && CLIENTS.length) selClientForUpload = CLIENTS[0];
    updateSelPills();
  };
  reader.readAsDataURL(file);
});

function pickClient(id) {
  for (var i = 0; i < CLIENTS.length; i++) {
    if (CLIENTS[i].id === id) { selClientForUpload = CLIENTS[i]; break; }
  }
  updateSelPills();
}

function updateSelPills() {
  var el = document.getElementById('sel-pills');
  if (!el) return;
  var html = '';
  for (var i = 0; i < CLIENTS.length; i++) {
    var c = CLIENTS[i];
    var isSel = selClientForUpload && selClientForUpload.id === c.id;
    html += '<button onclick="pickClient(' + c.id + ')" style="padding:6px 14px;border-radius:20px;border:1px solid ' +
      (isSel ? c.color : 'rgba(255,255,255,.07)') +
      ';background:' + (isSel ? 'rgba(0,0,0,.2)' : 'transparent') +
      ';color:' + (isSel ? c.color : 'rgba(255,255,255,.3)') +
      ';font-size:12px;cursor:pointer">' + c.name + '</button>';
  }
  el.innerHTML = html;
}

function resetUpload() {
  imgFile = null;
  document.getElementById('fin').value = '';
  showEl('u-box', true);
  showEl('u-prev', false);
  showEl('u-proc', false);
  showEl('u-res', false);
  showEl('u-err', false);
}

function showErr(msg) {
  document.getElementById('err-m').textContent = msg;
  showEl('u-err', true);
  showEl('u-proc', false);
  showEl('u-prev', false);
  showEl('u-box', true);
}

function setSteps(done, active) {
  var defs = [['vision','GPT-4o Vision чете фиша'],['sports','Проверка на резултатите'],['calc','Изчисляване'],['save','Записване']];
  var html = '';
  for (var i = 0; i < defs.length; i++) {
    var s = defs[i];
    var d = done.indexOf(s[0]) !== -1;
    var a = s[0] === active;
    html += '<div class="step' + (d ? ' done' : a ? ' active' : '') + '">' +
      '<div class="sdot">' + (d ? '✓' : a ? '…' : '○') + '</div>' + s[1] + '</div>';
  }
  document.getElementById('steps-el').innerHTML = html;
}

function analyze() {
  if (!imgFile) { showErr('Няма снимка'); return; }
  if (!selClientForUpload) { showErr('Избери клиент'); return; }
  showEl('u-prev', false);
  showEl('u-proc', true);
  showEl('u-res', false);
  showEl('u-err', false);
  var done = [];
  setSteps(done, 'vision');
  var fd = new FormData();
  fd.append('image', imgFile);
  fd.append('client_id', selClientForUpload.id);
  fetch('/api/analyze', {method:'POST', body:fd}).then(function(r) {
    return r.json().then(function(data) { return {ok: r.ok, data: data}; });
  }).then(function(res) {
    if (!res.ok) throw new Error(res.data.error || 'Сървърна грешка');
    done = ['vision','sports','calc','save'];
    setSteps(done, null);
    curResult = res.data;
    showEl('u-proc', false);
    renderResult(res.data);
    loadDashboard();
  }).catch(function(e) {
    showEl('u-proc', false);
    showErr(e.message || 'Грешка');
  });
}

function renderResult(data) {
  var ra = document.getElementById('u-res');
  ra.style.display = 'block';
  var isProfit = data.isProfit, isPending = data.isPending, ourAmount = data.ourAmount;
  var matches = data.matches || [], slip = data.slip;
  var cls = isPending ? 'pd' : isProfit ? 'pr' : 'ls';
  var ac = isPending ? '#fbbf24' : isProfit ? '#4ade80' : '#f87171';
  var at = isPending ? '⏳ ИЗЧАКВАНЕ' : ((isProfit ? '+' : '-') + Number(ourAmount).toFixed(2) + ' лв.');
  var st = isPending ? 'МАЧОВЕТЕ НЕ СА ПРИКЛЮЧИЛИ' : isProfit ? 'ЗАГУБЕН ФИШ — НИЕ ПЕЧЕЛИМ' : 'СПЕЧЕЛЕН ФИШ — НИЕ ГУБИМ';
  var clientName = selClientForUpload ? selClientForUpload.name : '';
  var html = '<div class="res-card"><div class="res-top ' + cls + '">' +
    '<div class="res-lbl">НАШ РЕЗУЛТАТ · ' + clientName + '</div>' +
    '<div class="res-amt" style="color:' + ac + '">' + at + '</div>' +
    '<div class="res-status" style="color:' + ac + '">' + st + '</div>' +
    '</div><div class="res-stats">' +
    '<div class="rs"><div class="rs-l">ЗАЛОГ</div><div class="rs-v">' + slip.stake + ' лв.</div></div>' +
    '<div class="rs"><div class="rs-l">×КОЕ-Т</div><div class="rs-v">×' + slip.totalOdds + '</div></div>' +
    '<div class="rs"><div class="rs-l">ПОТ.ПЕЧ.</div><div class="rs-v">' + slip.potentialWin + ' лв.</div></div>' +
    '</div><div class="matches">';
  for (var i = 0; i < matches.length; i++) {
    var m = matches[i];
    var w = m.result === 'WIN', l = m.result === 'LOSS', v = m.result === 'LIVE';
    html += '<div class="mrow' + (w ? ' w' : l ? ' l' : v ? ' v' : '') + '">' +
      '<div style="flex:1"><div class="mt">' + (m.display || m.team1 + ' vs ' + m.team2) + '</div>' +
      '<div class="mm">×' + m.odds + ' · ' + m.sport + '</div></div>' +
      '<div style="text-align:right">';
    if (m.score && m.score !== 'N/F') {
      html += '<div style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:2px">' + m.score + '</div>';
    }
    html += '<div class="mi">' + (w ? '❌' : l ? '✅' : v ? '🔴' : '⏳') + '</div>' +
      '<div class="obs">' +
      '<button class="ob w" onclick="ovr(' + i + ',\'WIN\')">❌</button>' +
      '<button class="ob l" onclick="ovr(' + i + ',\'LOSS\')">✅</button>' +
      '<button class="ob p" onclick="ovr(' + i + ',\'PENDING\')">⏳</button>' +
      '</div></div></div>';
  }
  html += '</div>';
  if (isPending) {
    html += '<button class="save-btn" onclick="manSave()">💾 ЗАПАЗИ РЪЧНО</button>';
  }
  html += '<button class="save-btn" style="background:transparent;border-color:rgba(255,255,255,.07);color:rgba(255,255,255,.3)" onclick="resetUpload()">✕ Нов фиш</button></div>';
  ra.innerHTML = html;
}

function ovr(i, v) {
  if (!curResult) return;
  curResult.matches[i].result = v;
  var anyL = false, allW = true;
  for (var j = 0; j < curResult.matches.length; j++) {
    if (curResult.matches[j].result === 'LOSS') anyL = true;
    if (curResult.matches[j].result !== 'WIN') allW = false;
  }
  curResult.isProfit = anyL;
  curResult.isPending = !anyL && !allW;
  curResult.ourAmount = curResult.isPending ? 0 : anyL ? curResult.slip.stake : curResult.slip.potentialWin;
  fetch('/api/slips/' + curResult.slip.id, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      result: curResult.isPending ? 'PENDING' : anyL ? 'LOSS' : 'WIN',
      our_amount: curResult.ourAmount,
      is_profit: anyL,
      matches: curResult.matches
    })
  });
  renderResult(curResult);
}

function manSave() {
  if (!curResult) return;
  var anyL = false, allW = true;
  for (var j = 0; j < curResult.matches.length; j++) {
    if (curResult.matches[j].result === 'LOSS') anyL = true;
    if (curResult.matches[j].result !== 'WIN') allW = false;
  }
  var isPend = !anyL && !allW;
  var amt = isPend ? 0 : anyL ? curResult.slip.stake : curResult.slip.potentialWin;
  fetch('/api/slips/' + curResult.slip.id, {
    method:'PATCH',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({result: isPend?'PENDING':anyL?'LOSS':'WIN', our_amount:amt, is_profit:anyL, matches:curResult.matches})
  }).then(function() {
    loadDashboard();
    resetUpload();
  });
}

// Manual slip
function openManual() {
  if (!CLIENTS.length) return;
  var opts = '';
  for (var i = 0; i < CLIENTS.length; i++) {
    opts += '<option value="' + CLIENTS[i].id + '">' + CLIENTS[i].name + '</option>';
  }
  var today = new Date().toISOString().slice(0,10);
  openModal('Добави фиш ръчно',
    '<div class="field"><label>Клиент</label><select id="m-client">' + opts + '</select></div>' +
    '<div class="field"><label>Дата</label><input type="date" id="m-date" value="' + today + '"></div>' +
    '<div class="field"><label>Залог (лв.)</label><input type="number" id="m-stake" placeholder="150"></div>' +
    '<div class="field"><label>Резултат</label><select id="m-result">' +
    '<option value="LOSS">Загубен фиш (ние печелим)</option>' +
    '<option value="WIN">Спечелен фиш (ние губим)</option>' +
    '<option value="PENDING">Изчакване</option>' +
    '</select></div>' +
    '<div class="field"><label>Наша сума (лв.)</label><input type="number" id="m-amount" placeholder="150"></div>' +
    '<div class="field"><label>Мачове (по избор)</label><input id="m-matches" placeholder="КАР - КОЛ"></div>' +
    '<div class="modal-btns">' +
    '<button class="modal-btn cancel" onclick="closeModal()">Отказ</button>' +
    '<button class="modal-btn primary" onclick="saveManual()">Запази</button>' +
    '</div>'
  );
}

function saveManual() {
  var client_id = document.getElementById('m-client').value;
  var slip_date = document.getElementById('m-date').value;
  var stake = parseFloat(document.getElementById('m-stake').value) || 0;
  var result = document.getElementById('m-result').value;
  var our_amount = parseFloat(document.getElementById('m-amount').value) || stake;
  var matchText = document.getElementById('m-matches').value;
  var is_profit = result === 'LOSS';
  var matches = matchText ? [{display:matchText,team1:'',team2:'',pick:'1',odds:1,sport:'',result:result}] : [];
  fetch('/api/slips/manual', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({client_id:client_id,slip_date:slip_date,stake:stake,result:result,our_amount:our_amount,is_profit:is_profit,matches:matches})
  }).then(function() {
    closeModal();
    loadDashboard();
  });
}

// Live
function loadLive() {
  var el = document.getElementById('live-content');
  el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.3);padding:30px">Зарежда...</div>';
  fetch('/api/live').then(function(r) { return r.json(); }).then(function(res) {
    var live = res.live || [];
    if (!live.length) {
      el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.3);padding:30px">Няма активни мачове</div>';
      return;
    }
    var html = '';
    for (var i = 0; i < live.length; i++) {
      var g = live[i];
      var isLive = g.status === 'LIVE';
      var dotColor = isLive ? '#f87171' : 'rgba(255,255,255,.3)';
      var statusText = isLive ? 'НА ЖИВО' : 'ПРЕДСТОЯЩ';
      html += '<div class="live-card">' +
        '<div class="lc-hdr">' +
        '<div class="lc-live"><span style="width:6px;height:6px;border-radius:50%;background:' + dotColor + ';display:inline-block"></span> ' + statusText + '</div>' +
        '<span class="lc-lg">' + g.sport + '</span>' +
        '</div>' +
        '<div class="lc-score">' +
        '<div class="lc-team">' + (g.away || '') + '</div>' +
        '<div class="lc-result">' + (isLive ? g.awayScore + ':' + g.homeScore : 'vs') + '</div>' +
        '<div class="lc-team" style="text-align:right">' + (g.home || '') + '</div>' +
        '</div></div>';
    }
    el.innerHTML = html;
  }).catch(function() {
    el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.3);padding:30px">Грешка при зареждане</div>';
  });
}

// History
function loadHistory() {
  var el = document.getElementById('hist-content');
  fetch('/api/clients').then(function(r) { return r.json(); }).then(function(clients) {
    var totalBal = 0, totalTot = 0;
    for (var i = 0; i < clients.length; i++) {
      totalBal += Number(clients[i].balance || 0);
      totalTot += Number(clients[i].total || 0);
    }
    var html = '<div style="padding:0 14px 12px">' +
      '<div style="background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
      '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:3px">ТЕКУЩ БАЛАНС</div>' +
      '<div style="font-size:18px;font-weight:500;color:' + (totalBal >= 0 ? '#4ade80' : '#f87171') + '">' + (totalBal >= 0 ? '+' : '') + Math.round(totalBal) + ' лв.</div></div>' +
      '<div style="text-align:center"><div style="font-size:9px;color:rgba(255,255,255,.3);margin-bottom:3px">ТОТАЛ</div>' +
      '<div style="font-size:18px;font-weight:500;color:' + (totalTot >= 0 ? '#4ade80' : '#f87171') + '">' + (totalTot >= 0 ? '+' : '') + Math.round(totalTot) + ' лв.</div></div>' +
      '</div></div>';
    for (var i = 0; i < clients.length; i++) {
      var c = clients[i];
      var bal = Number(c.balance || 0);
      var tot = Number(c.total || 0);
      html += '<div style="background:#111827;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;margin:0 14px 8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="openClientById(' + c.id + ')">' +
        '<div><div style="font-size:13px;font-weight:500;color:' + (bal >= 0 ? '#4ade80' : '#f87171') + '">' + c.name + '</div>' +
        '<div style="font-size:10px;color:rgba(255,255,255,.3);margin-top:2px">' + (c.total_slips || 0) + ' фиша · ' + c.wins + 'W/' + c.losses + 'L</div></div>' +
        '<div style="text-align:right">' +
        '<div style="font-size:18px;font-weight:500;color:' + (bal >= 0 ? '#4ade80' : '#f87171') + '">' + (bal >= 0 ? '+' : '') + Math.round(bal) + ' лв.</div>' +
        '<div style="font-size:10px;color:rgba(255,255,255,.3)">Тотал: ' + (tot >= 0 ? '+' : '') + Math.round(tot) + ' лв.</div>' +
        '</div></div>';
    }
    el.innerHTML = html;
  }).catch(function() {
    el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.3);padding:30px">Грешка</div>';
  });
}

// Modal overlay close
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
loadDashboard();
setInterval(loadDashboard, 30000);
setInterval(function() {
  if (document.getElementById('pg-live').className.indexOf('act') !== -1) loadLive();
}, 30000);
</script>
</body>
</html>

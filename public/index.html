<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Залози</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#08080f;color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;padding-bottom:80px}

/* ── NAVIGATION ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(8,8,15,.96);border-top:1px solid rgba(255,255,255,.07);display:flex;z-index:99;padding:8px 0 max(12px,env(safe-area-inset-bottom));backdrop-filter:blur(20px)}
.nb{flex:1;background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;transition:color .15s}
.nb.on{color:#818cf8}
.nb-i{font-size:22px;line-height:1}
.nb-l{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}

/* ── PAGES ── */
.pg{display:none;padding-bottom:8px}
.pg.on{display:block}

/* ── HERO ── */
.hero{margin:12px;border-radius:18px;background:linear-gradient(145deg,#0e0e20,#1a1a35);border:1px solid rgba(99,102,241,.15);padding:18px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-50px;right:-30px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.1) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px}
.hero-total{font-size:38px;font-weight:700;letter-spacing:-1.5px;margin-bottom:12px;line-height:1}
.hero-stats{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.07);padding-top:12px;margin-bottom:14px}
.hs{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.07)}
.hs:last-child{border:none}
.hs-l{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.hs-v{font-size:14px;font-weight:700}
.hero-chart-label{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px}
.bars{display:flex;align-items:flex-end;gap:3px;height:48px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.bar.g{background:rgba(74,222,128,.6)}
.bar.r{background:rgba(248,113,113,.6)}
.bar.z{height:2px;background:rgba(255,255,255,.1)}
.bar-d{font-size:8px;color:rgba(255,255,255,.2)}

/* ── SECTION ── */
.sec-h{padding:4px 12px 8px;display:flex;justify-content:space-between;align-items:center}
.sec-t{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.1em;text-transform:uppercase}
.btn-new{background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);color:#818cf8;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer}

/* ── CLIENT CARDS ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 12px}
.cc{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:13px;padding:12px;cursor:pointer;transition:transform .1s}
.cc:active{transform:scale(.97)}
.cc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.cc-name{font-size:12px;font-weight:700}
.cc-wl{font-size:9px;padding:2px 6px;border-radius:6px;font-weight:600;background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
.cc-bal{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.cc-prog{height:2px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:8px}
.cc-prog-fill{height:100%;border-radius:2px}
.cc-foot{font-size:9px;color:rgba(255,255,255,.25);margin-bottom:7px}
.cc-settle{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);border-radius:6px;padding:4px;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.05em;text-transform:uppercase}

/* ── UPLOAD ── */
.upload-wrap{padding:0 12px}
.upload-lbl{display:block;background:#0d0d1e;border:1.5px dashed rgba(255,255,255,.1);border-radius:15px;padding:24px;text-align:center;cursor:pointer}
.upload-icon{width:48px;height:48px;border-radius:12px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 10px}
.upload-title{font-size:14px;font-weight:600;margin-bottom:3px}
.upload-sub{font-size:11px;color:rgba(255,255,255,.3)}
.btn-manual{width:100%;background:transparent;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.25);padding:11px;border-radius:11px;font-size:13px;cursor:pointer;margin-top:8px}
.preview-img{width:100%;max-height:200px;object-fit:contain;background:#000;border-radius:12px;display:block;margin-bottom:10px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pill{padding:6px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.3);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.pill.on{font-weight:700}
.btn-row{display:flex;gap:8px}
.btn-analyze{flex:2;background:#6366f1;border:none;color:#fff;padding:14px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer}
.btn-cancel{flex:1;background:transparent;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);padding:14px;border-radius:12px;font-size:13px;cursor:pointer}

/* ── PROCESSING ── */
.proc{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:15px;padding:20px;text-align:center}
.proc-title{font-size:14px;font-weight:600;margin-bottom:14px}
.step{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12px;color:rgba(255,255,255,.25);text-align:left}
.step:last-child{border:none}
.step.done{color:#4ade80}
.step.act{color:#f1f5f9;font-weight:600}
.step-dot{width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.step.done .step-dot{background:rgba(74,222,128,.12);color:#4ade80}
.step.act .step-dot{background:rgba(99,102,241,.18);color:#818cf8}

/* ── RESULT ── */
.res-card{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:15px;overflow:hidden;margin-bottom:10px}
.res-top{padding:22px;text-align:center}
.res-top.pr{background:linear-gradient(135deg,rgba(74,222,128,.07),transparent)}
.res-top.ls{background:linear-gradient(135deg,rgba(248,113,113,.07),transparent)}
.res-top.pd{background:rgba(251,191,36,.04)}
.res-label{font-size:10px;color:rgba(255,255,255,.3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:5px}
.res-amt{font-size:38px;font-weight:700;letter-spacing:-1.5px;margin-bottom:5px;line-height:1}
.res-status{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.6}
.res-stats{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid rgba(255,255,255,.07)}
.rss{padding:12px 4px;text-align:center;border-right:1px solid rgba(255,255,255,.07)}
.rss:last-child{border:none}
.rss-l{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.rss-v{font-size:13px;font-weight:600}
.match-list{padding:10px 10px 0}
.match-row{display:flex;align-items:center;gap:10px;padding:9px;background:rgba(255,255,255,.02);border-radius:9px;margin-bottom:5px;border-left:3px solid rgba(255,255,255,.07)}
.match-row.w{border-left-color:#dc2626}
.match-row.l{border-left-color:#16a34a}
.match-row.v{border-left-color:#d97706}
.match-txt{flex:1}
.match-name{font-size:12px;font-weight:600;margin-bottom:2px}
.match-sub{font-size:10px;color:rgba(255,255,255,.3)}
.match-icon{font-size:18px}
.override-btns{display:flex;gap:3px;margin-top:4px}
.ob{flex:1;border:1px solid rgba(255,255,255,.08);background:transparent;color:rgba(255,255,255,.25);padding:3px;border-radius:5px;font-size:9px;cursor:pointer}
.ob.w{border-color:rgba(248,113,113,.3);color:#f87171}
.ob.l{border-color:rgba(74,222,128,.3);color:#4ade80}
.ob.p{border-color:rgba(251,191,36,.3);color:#fbbf24}
.btn-save{display:block;width:calc(100% - 20px);margin:0 10px 10px;padding:12px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;border:1px solid rgba(74,222,128,.2);background:rgba(74,222,128,.07);color:#4ade80}
.btn-new-slip{display:block;width:calc(100% - 20px);margin:0 10px 12px;padding:11px;border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;text-align:center;border:1px solid rgba(255,255,255,.07);background:transparent;color:rgba(255,255,255,.25)}

/* ── ERROR ── */
.err{background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.18);border-radius:12px;padding:14px}
.err-msg{font-size:12px;color:#fca5a5;line-height:1.5;margin-bottom:8px}
.err-close{background:transparent;border:1px solid rgba(248,113,113,.2);color:#f87171;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px}

/* ── CLIENT PAGE ── */
.cp-back{background:transparent;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;padding:14px 12px 8px;display:block}
.cp-hdr{padding:0 12px 14px;display:flex;justify-content:space-between;align-items:center}
.cp-name{font-size:18px;font-weight:700}
.cp-actions{display:flex;gap:6px}
.cp-btn{background:transparent;border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.3);padding:6px 11px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500}
.cp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:0 12px;margin-bottom:11px}
.cp-stat{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px;text-align:center}
.cp-stat-l{font-size:9px;color:rgba(255,255,255,.25);margin-bottom:2px;text-transform:uppercase;letter-spacing:.08em}
.cp-stat-v{font-size:15px;font-weight:700}
.cp-chart{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:12px;margin:0 12px 11px}
.cp-chart-t{font-size:9px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}

/* ── SLIPS ── */
.slip{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:11px;margin:0 12px 7px}
.slip-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.slip-meta{font-size:10px;color:rgba(255,255,255,.3)}
.slip-right{display:flex;align-items:center;gap:7px}
.slip-amt{font-size:16px;font-weight:700}
.slip-del{width:26px;height:26px;border-radius:7px;background:rgba(248,113,113,.06);border:1px solid rgba(248,113,113,.14);color:rgba(248,113,113,.5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0}
.slip-matches{font-size:11px;color:rgba(255,255,255,.3);margin-bottom:4px;line-height:1.5}
.slip-foot{display:flex;justify-content:space-between;align-items:center}
.slip-stake{font-size:10px;color:rgba(255,255,255,.2)}
.slip-tag{font-size:9px;padding:2px 8px;border-radius:7px;font-weight:600}
.slip-tag.g{background:rgba(74,222,128,.1);color:#4ade80}
.slip-tag.r{background:rgba(248,113,113,.1);color:#f87171}
.slip-tag.p{background:rgba(251,191,36,.1);color:#fbbf24}

/* ── LIVE ── */
.live-card{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:13px;margin:0 12px 7px}
.lc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.lc-live-badge{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:#f87171}
.lc-dot{width:6px;height:6px;border-radius:50%;background:#f87171;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.lc-sport{font-size:10px;color:rgba(255,255,255,.25)}
.lc-score{display:flex;justify-content:space-between;align-items:center}
.lc-team{font-size:13px;font-weight:700}
.lc-num{font-size:26px;font-weight:700;letter-spacing:-.5px}

/* ── HISTORY ── */
.hist-item{background:#0d0d1e;border:1px solid rgba(255,255,255,.07);border-radius:11px;padding:12px;margin:0 12px 7px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.hi-name{font-size:13px;font-weight:700;margin-bottom:2px}
.hi-sub{font-size:10px;color:rgba(255,255,255,.25)}
.hi-bal{font-size:19px;font-weight:700;text-align:right;margin-bottom:2px}
.hi-slips{font-size:10px;color:rgba(255,255,255,.25);text-align:right}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#0f0f1f;border-radius:18px 18px 0 0;padding:20px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;text-align:center}
.field{margin-bottom:12px}
.field label{font-size:10px;color:rgba(255,255,255,.3);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.09em;font-weight:600}
.field input,.field select,.field textarea{width:100%;background:#0a0a18;border:1px solid rgba(255,255,255,.1);color:#f1f5f9;padding:11px 13px;border-radius:9px;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
.field textarea{resize:none;height:65px}
.colors{display:flex;gap:8px;flex-wrap:wrap}
.color-opt{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.color-opt.on{border-color:#fff}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.mbtn{flex:1;padding:12px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.mbtn.p{background:#6366f1;color:#fff}
.mbtn.c{background:#0d0d1e;color:rgba(255,255,255,.3)}
.mbtn.d{background:rgba(248,113,113,.1);color:#f87171;border:1px solid rgba(248,113,113,.2)}
</style>
</head>
<body>

<!-- MAIN PAGE -->
<div id="pg-main" class="pg on">
  <div class="hero">
    <div class="hero-label">Общо</div>
    <div class="hero-total" id="h-total">0 лв.</div>
    <div class="hero-stats">
      <div class="hs"><div class="hs-l">Win rate</div><div class="hs-v" id="h-wr">—</div></div>
      <div class="hs"><div class="hs-l">Фишове</div><div class="hs-v" id="h-slips">0</div></div>
      <div class="hs"><div class="hs-l">Печалби</div><div class="hs-v" id="h-wins" style="color:#4ade80">0</div></div>
      <div class="hs"><div class="hs-l">Загуби</div><div class="hs-v" id="h-losses" style="color:#f87171">0</div></div>
    </div>
    <div class="hero-chart-label">14 дни</div>
    <div class="bars" id="main-bars"></div>
  </div>
  <div class="sec-h">
    <div class="sec-t">Клиенти</div>
    <button type="button" class="btn-new" onclick="openAddClient()">+ Нов</button>
  </div>
  <div class="grid" id="clients-grid"></div>
  <div class="upload-wrap">
    <div id="u-idle">
      <label class="upload-lbl" for="f-img">
        <div class="upload-icon">📷</div>
        <div class="upload-title">Качи снимка на фиш</div>
        <div class="upload-sub">bet365 · JPEG · PNG · HEIC</div>
      </label>
      <input type="file" id="f-img" accept="image/*" style="position:fixed;left:-9999px;opacity:0;width:1px;height:1px">
      <button type="button" class="btn-manual" onclick="openManual()">+ Добави ръчно</button>
    </div>
    <div id="u-preview" style="display:none">
      <img id="u-prev-img" class="preview-img" src="" alt="">
      <div class="sec-t" style="padding:0 0 6px">Избери клиент:</div>
      <div class="pills" id="client-pills"></div>
      <div class="btn-row">
        <button type="button" class="btn-analyze" onclick="doAnalyze()">⚡ Анализирай</button>
        <button type="button" class="btn-cancel" onclick="resetUpload()">✕</button>
      </div>
    </div>
    <div id="u-proc" style="display:none">
      <div class="proc">
        <div class="proc-title">Обработвам...</div>
        <div id="steps"></div>
      </div>
    </div>
    <div id="u-err" style="display:none">
      <div class="err">
        <div class="err-msg" id="err-text"></div>
        <button type="button" class="err-close" onclick="hideErr()">Затвори</button>
      </div>
    </div>
    <div id="u-result" style="display:none"></div>
  </div>
</div>

<!-- LIVE PAGE -->
<div id="pg-live" class="pg">
  <div style="padding:14px 12px 8px;display:flex;justify-content:space-between;align-items:center">
    <div style="font-size:17px;font-weight:700">На живо</div>
    <button type="button" class="btn-new" onclick="loadLive()">↻</button>
  </div>
  <div id="live-wrap"></div>
</div>

<!-- HISTORY PAGE -->
<div id="pg-hist" class="pg">
  <div style="padding:14px 12px 8px;font-size:17px;font-weight:700">История</div>
  <div id="hist-wrap"></div>
</div>

<!-- CLIENT PAGE -->
<div id="pg-client" class="pg">
  <button type="button" class="cp-back" onclick="showPage('main')">← Назад</button>
  <div class="cp-hdr">
    <div class="cp-name" id="cp-name">—</div>
    <div class="cp-actions">
      <button type="button" class="cp-btn" onclick="openEditClient()">✏️</button>
      <button type="button" class="cp-btn" style="color:#f87171;border-color:rgba(248,113,113,.2)" onclick="openSettle()">Нулирай</button>
    </div>
  </div>
  <div class="cp-stats">
    <div class="cp-stat"><div class="cp-stat-l">Баланс</div><div class="cp-stat-v" id="cp-bal">0</div></div>
    <div class="cp-stat"><div class="cp-stat-l">Фишове</div><div class="cp-stat-v" id="cp-total-slips">0</div></div>
    <div class="cp-stat"><div class="cp-stat-l">Win rate</div><div class="cp-stat-v" id="cp-wr">—</div></div>
  </div>
  <div class="cp-chart">
    <div class="cp-chart-t">Прогрес по дни</div>
    <div class="bars" id="cp-bars"></div>
  </div>
  <div style="padding:0 12px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center">
    <div class="sec-t">Фишове</div>
  </div>
  <div id="cp-slips"></div>
</div>

<!-- NAVIGATION -->
<nav class="nav">
  <button type="button" class="nb on" id="nb-main" onclick="showPage('main')">
    <span class="nb-i">📷</span><span class="nb-l">Фиш</span>
  </button>
  <button type="button" class="nb" id="nb-live" onclick="showPage('live')">
    <span class="nb-i">🔴</span><span class="nb-l">На живо</span>
  </button>
  <button type="button" class="nb" id="nb-hist" onclick="showPage('hist')">
    <span class="nb-i">📋</span><span class="nb-l">История</span>
  </button>
</nav>

<!-- MODAL -->
<div id="modal-bg" style="display:none" class="modal-bg">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
var CLIENTS_DATA = [];
var selClient = null;
var curClient = null;
var curResult = null;
var imgFile   = null;
var COLORS = ['#6366f1','#3b82f6','#f59e0b','#f97316','#ef4444','#8b5cf6','#10b981','#ec4899'];

// ── WEBSOCKET ──────────────────────────────────────────────
var ws;
function connectWS() {
  try {
    var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host);
    ws.onclose = function () { setTimeout(connectWS, 3000); };
    ws.onerror = function () {};
    ws.onmessage = function (e) {
      try {
        var d = JSON.parse(e.data);
        if (d.type === 'new_slip' || d.type === 'slip_updated' || d.type === 'slip_deleted' || d.type === 'client_settled') {
          loadDashboard();
          if (curClient) loadClientSlips(curClient);
        }
      } catch (ex) {}
    };
  } catch (err) { setTimeout(connectWS, 3000); }
}
connectWS();

// ── HELPERS ────────────────────────────────────────────────
function showPage(p) {
  ['main','live','hist','client'].forEach(function (x) {
    var pg = document.getElementById('pg-' + x);
    var nb = document.getElementById('nb-' + x);
    if (pg) pg.className = 'pg' + (x === p ? ' on' : '');
    if (nb) nb.className = 'nb' + (x === p ? ' on' : '');
  });
  if (p === 'live') loadLive();
  if (p === 'hist') loadHist();
}

function show(id, v) {
  var el = document.getElementById(id);
  if (el) el.style.display = v ? 'block' : 'none';
}

function apiFetch(url, opts) {
  return fetch(url, opts).then(function (r) {
    return r.text().then(function (txt) {
      var data;
      try { data = JSON.parse(txt); } catch (e) { throw new Error('Bad response'); }
      if (!r.ok) throw new Error(data.error || ('HTTP ' + r.status));
      return data;
    });
  });
}

function fmtBal(n) {
  return (n >= 0 ? '+' : '') + Math.round(n) + ' лв.';
}

function balColor(n) { return n > 0 ? '#4ade80' : n < 0 ? '#f87171' : 'rgba(255,255,255,.3)'; }

// ── RENDER BARS ────────────────────────────────────────────
function renderBars(id, data) {
  var el = document.getElementById(id);
  if (!el || !data || !data.length) { if (el) el.innerHTML = ''; return; }
  var max = 1;
  data.forEach(function (d) { var v = Math.abs(Number(d.amount)); if (v > max) max = v; });
  el.innerHTML = data.map(function (d) {
    var amt = Number(d.amount);
    var h   = Math.max(2, Math.round(Math.abs(amt) / max * 44));
    var cls = amt > 0 ? 'g' : amt < 0 ? 'r' : 'z';
    var day = String(d.date || '').slice(8);
    return '<div class="bar-col"><div class="bar ' + cls + '" style="height:' + h + 'px"></div><div class="bar-d">' + day + '</div></div>';
  }).join('');
}

// ── DASHBOARD ──────────────────────────────────────────────
function loadDashboard() {
  apiFetch('/api/clients').then(function (data) {
    CLIENTS_DATA = data;
    var totalBal = 0, wins = 0, losses = 0, slips = 0;
    data.forEach(function (c) {
      totalBal += Number(c.balance || 0);
      wins     += Number(c.wins || 0);
      losses   += Number(c.losses || 0);
      slips    += Number(c.total_slips || 0);
    });
    var tot = wins + losses;
    var hTotal = document.getElementById('h-total');
    hTotal.textContent = fmtBal(totalBal);
    hTotal.style.color = balColor(totalBal);
    document.getElementById('h-wr').textContent     = tot > 0 ? Math.round(wins / tot * 100) + '%' : '—';
    document.getElementById('h-slips').textContent  = slips;
    document.getElementById('h-wins').textContent   = wins;
    document.getElementById('h-losses').textContent = losses;
    renderGrid();
    updatePills();
    apiFetch('/api/chart').then(function (ch) { renderBars('main-bars', ch); }).catch(function () {});
  }).catch(function (e) {
    console.error('loadDashboard:', e.message);
  });
}

function renderGrid() {
  var el = document.getElementById('clients-grid');
  el.innerHTML = CLIENTS_DATA.map(function (c) {
    var bal = Number(c.balance || 0);
    var nc  = balColor(bal);
    var bc  = bal > 0 ? 'rgba(74,222,128,.35)' : bal < 0 ? 'rgba(248,113,113,.35)' : 'rgba(255,255,255,.1)';
    var prog = Math.min(100, Math.abs(bal) / 10);
    return '<div class="cc" onclick="openClientPage(' + c.id + ')">' +
      '<div class="cc-head"><div class="cc-name" style="color:' + nc + '">' + c.name + '</div>' +
      '<span class="cc-wl">' + c.wins + 'W ' + c.losses + 'L</span></div>' +
      '<div class="cc-bal" style="color:' + nc + '">' + fmtBal(bal) + '</div>' +
      '<div class="cc-prog"><div class="cc-prog-fill" style="width:' + prog + '%;background:' + bc + '"></div></div>' +
      '<div class="cc-foot">' + c.total_slips + ' фиша</div>' +
      '<button type="button" class="cc-settle" onclick="event.stopPropagation();quickSettle(' + c.id + ')">Нулирай сметка</button>' +
      '</div>';
  }).join('');
}

// ── CLIENT PAGE ────────────────────────────────────────────
function openClientPage(id) {
  var c = null;
  CLIENTS_DATA.forEach(function (x) { if (x.id === id) c = x; });
  if (!c) return;
  curClient = c;
  showPage('client');
  var bal = Number(c.balance || 0);
  var nc  = balColor(bal);
  var tot = c.wins + c.losses;
  document.getElementById('cp-name').textContent = c.name;
  document.getElementById('cp-name').style.color = nc;
  document.getElementById('cp-bal').textContent = fmtBal(bal);
  document.getElementById('cp-bal').style.color = nc;
  document.getElementById('cp-total-slips').textContent = c.total_slips;
  document.getElementById('cp-wr').textContent = tot > 0 ? Math.round(c.wins / tot * 100) + '%' : '—';
  apiFetch('/api/clients/' + id + '/chart').then(function (ch) { renderBars('cp-bars', ch); }).catch(function () {});
  loadClientSlips(c);
}

function loadClientSlips(c) {
  apiFetch('/api/clients/' + c.id + '/slips').then(function (slips) {
    var el = document.getElementById('cp-slips');
    if (!slips.length) { el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:30px">Няма фишове</div>'; return; }
    el.innerHTML = slips.map(function (s) {
      var isP = s.is_profit, isPend = s.result === 'PENDING';
      var ac  = isPend ? '#fbbf24' : isP ? '#4ade80' : '#f87171';
      var tc  = isPend ? 'p' : isP ? 'g' : 'r';
      var tt  = isPend ? 'Изчакване' : isP ? 'Загубен фиш' : 'Спечелен фиш';
      var amtTxt = isPend ? '⏳ —' : fmtBal(isP ? s.our_amount : -s.our_amount);
      var ms = s.matches && s.matches[0] && s.matches[0].display ? s.matches[0].display : '—';
      var dateStr = String(s.slip_date || '').slice(0, 10);
      return '<div class="slip">' +
        '<div class="slip-top"><div class="slip-meta">' + dateStr + (s.total_odds ? ' · x' + s.total_odds : '') + '</div>' +
        '<div class="slip-right">' +
        '<div class="slip-amt" style="color:' + ac + '">' + amtTxt + '</div>' +
        '<div class="slip-del" onclick="delSlip(\'' + s.id + '\',\'' + s.tableId + '\')">🗑</div>' +
        '</div></div>' +
        '<div class="slip-matches">' + ms + '</div>' +
        '<div class="slip-foot"><div class="slip-stake">' + Math.round(s.stake) + ' лв. залог</div>' +
        '<span class="slip-tag ' + tc + '">' + tt + '</span></div>' +
        '</div>';
    }).join('');
  }).catch(function () {
    document.getElementById('cp-slips').innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:30px">Грешка</div>';
  });
}

function delSlip(atId, tableId) {
  if (!confirm('Изтрий фиша?')) return;
  apiFetch('/api/slips/' + atId + '?tableId=' + tableId, { method: 'DELETE' })
    .then(function () { loadDashboard(); if (curClient) loadClientSlips(curClient); })
    .catch(function (e) { alert('Грешка: ' + e.message); });
}

function openSettle() {
  if (!curClient) return;
  var bal = Number(curClient.balance || 0);
  openModal('Нулирай сметка',
    '<div style="text-align:center;font-size:28px;font-weight:700;margin:12px 0;color:' + balColor(bal) + '">' + fmtBal(bal) + '</div>' +
    '<div style="font-size:12px;color:rgba(255,255,255,.3);text-align:center;margin-bottom:16px">Баланс на ' + curClient.name + '</div>' +
    '<div class="field"><label>Бележка</label><input id="settle-note" placeholder="Платено в брой..."></div>' +
    '<div class="modal-btns">' +
      '<button type="button" class="mbtn c" onclick="closeModal()">Отказ</button>' +
      '<button type="button" class="mbtn p" onclick="doSettle()">Потвърди нулиране</button>' +
    '</div>'
  );
}

function doSettle() {
  closeModal();
  loadDashboard();
}

function quickSettle(id) {
  var c = null;
  CLIENTS_DATA.forEach(function (x) { if (x.id === id) c = x; });
  if (!c) return;
  if (!confirm('Нулирай сметката на ' + c.name + '?\nБаланс: ' + fmtBal(Number(c.balance || 0)))) return;
  loadDashboard();
}

function openEditClient() {
  if (!curClient) return;
  var c = curClient;
  openModal('Редактирай клиент',
    '<div class="field"><label>Цвят</label><div class="colors">' +
    COLORS.map(function (col) { return '<div class="color-opt' + (col === c.color ? ' on' : '') + '" data-c="' + col + '" style="background:' + col + '" onclick="pickColor(this)"></div>'; }).join('') +
    '</div></div>' +
    '<div class="modal-btns"><button type="button" class="mbtn c" onclick="closeModal()">Отказ</button><button type="button" class="mbtn p" onclick="saveEditClient()">Запази</button></div>'
  );
}

function saveEditClient() { closeModal(); }

function openAddClient() {
  openModal('Нов клиент',
    '<div class="field"><label>Клиентите са фиксирани</label><div style="font-size:12px;color:rgba(255,255,255,.3);padding:8px 0">Системата поддържа Румен, Славчо, Близнаците и Доги. За промяна свържи се с администратора.</div></div>' +
    '<div class="modal-btns"><button type="button" class="mbtn p" onclick="closeModal()">Разбрах</button></div>'
  );
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-bg').style.display = 'flex';
  var inputs = document.querySelectorAll('#modal-body input,#modal-body textarea');
  for (var i = 0; i < inputs.length; i++) {
    inputs[i].addEventListener('keydown', function (e) { if (e.keyCode === 13) e.preventDefault(); });
  }
}

function closeModal() { document.getElementById('modal-bg').style.display = 'none'; }

document.getElementById('modal-bg').addEventListener('click', function (e) { if (e.target === this) closeModal(); });

function pickColor(el) {
  var all = document.querySelectorAll('#modal-body .color-opt');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('on');
  el.classList.add('on');
}

// ── UPLOAD ─────────────────────────────────────────────────
document.getElementById('f-img').addEventListener('change', function (e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  imgFile = file;
  var reader = new FileReader();
  reader.onload = function (ev) {
    document.getElementById('u-prev-img').src = ev.target.result;
    show('u-idle', false); show('u-preview', true); show('u-proc', false); show('u-result', false); show('u-err', false);
    if (!selClient && CLIENTS_DATA.length) selClient = CLIENTS_DATA[0];
    updatePills();
  };
  reader.readAsDataURL(file);
});

function pickClient(id) {
  CLIENTS_DATA.forEach(function (c) { if (c.id === id) selClient = c; });
  updatePills();
}

function updatePills() {
  var el = document.getElementById('client-pills');
  if (!el) return;
  el.innerHTML = CLIENTS_DATA.map(function (c) {
    var isS = selClient && selClient.id === c.id;
    return '<button type="button" class="pill' + (isS ? ' on' : '') + '" style="' + (isS ? 'border-color:' + c.color + ';color:' + c.color : '') + '" onclick="pickClient(' + c.id + ')">' + c.name + '</button>';
  }).join('');
}

function resetUpload() {
  imgFile = null;
  document.getElementById('f-img').value = '';
  show('u-idle', true); show('u-preview', false); show('u-proc', false); show('u-result', false); show('u-err', false);
}

function showErr(msg) {
  document.getElementById('err-text').textContent = msg;
  show('u-err', true); show('u-proc', false); show('u-preview', false); show('u-idle', true);
}

function hideErr() { show('u-err', false); }

function setSteps(done, active) {
  var defs = [['vision','GPT-4o чете фиша'],['sports','Проверка на резултатите'],['save','Записване в Airtable']];
  document.getElementById('steps').innerHTML = defs.map(function (d) {
    var isDone = done.indexOf(d[0]) >= 0, isAct = d[0] === active;
    return '<div class="step' + (isDone ? ' done' : isAct ? ' act' : '') + '">' +
      '<div class="step-dot">' + (isDone ? '✓' : isAct ? '●' : '○') + '</div>' + d[1] + '</div>';
  }).join('');
}

function doAnalyze() {
  if (!imgFile)   { showErr('Няма снимка'); return; }
  if (!selClient) { showErr('Избери клиент'); return; }
  show('u-preview', false); show('u-proc', true); show('u-result', false); show('u-err', false);
  setSteps([], 'vision');
  var fd = new FormData();
  fd.append('image', imgFile);
  fd.append('client_id', String(selClient.id));
  apiFetch('/api/analyze', { method: 'POST', body: fd })
    .then(function (data) {
      setSteps(['vision','sports','save'], null);
      curResult = data;
      show('u-proc', false);
      renderResult(data);
      loadDashboard();
    })
    .catch(function (e) { show('u-proc', false); showErr(e.message || 'Грешка'); });
}

function renderResult(data) {
  var el = document.getElementById('u-result');
  el.style.display = 'block';
  var ip  = data.isProfit, ipd = data.isPending;
  var cls = ipd ? 'pd' : ip ? 'pr' : 'ls';
  var ac  = ipd ? '#fbbf24' : ip ? '#4ade80' : '#f87171';
  var amtTxt = ipd ? '⏳ Изчакване' : fmtBal(ip ? data.ourAmount : -data.ourAmount);
  var statusTxt = ipd ? 'МАЧОВЕТЕ НЕ СА ПРИКЛЮЧИЛИ' : ip ? 'ЗАГУБЕН ФИШ — НИЕ ПЕЧЕЛИМ' : 'СПЕЧЕЛЕН ФИШ — НИЕ ГУБИМ';
  var s = data.slip || {};
  var html =
    '<div class="res-card">' +
    '<div class="res-top ' + cls + '">' +
      '<div class="res-label">РЕЗУЛТАТ · ' + (selClient ? selClient.name : '') + '</div>' +
      '<div class="res-amt" style="color:' + ac + '">' + amtTxt + '</div>' +
      '<div class="res-status" style="color:' + ac + '">' + statusTxt + '</div>' +
    '</div>' +
    '<div class="res-stats">' +
      '<div class="rss"><div class="rss-l">Залог</div><div class="rss-v">' + (s.stake || 0) + ' лв.</div></div>' +
      '<div class="rss"><div class="rss-l">Коефициент</div><div class="rss-v">x' + (s.totalOdds || 1) + '</div></div>' +
      '<div class="rss"><div class="rss-l">Потенциал</div><div class="rss-v">' + (s.potentialWin || 0) + ' лв.</div></div>' +
    '</div>' +
    '<div class="match-list">' +
    (data.matches || []).map(function (m, i) {
      var mw = m.result === 'WIN', ml = m.result === 'LOSS', mv = m.result === 'LIVE';
      return '<div class="match-row' + (mw?' w':ml?' l':mv?' v':'') + '">' +
        '<div class="match-txt"><div class="match-name">' + (m.display || '') + '</div>' +
        '<div class="match-sub">x' + (m.odds || 1) + ' · ' + (m.sport || '') + (m.score && m.score !== 'N/F' ? ' · ' + m.score : '') + '</div>' +
        '<div class="override-btns">' +
          '<button type="button" class="ob w" onclick="override(' + i + ',\'WIN\')">❌</button>' +
          '<button type="button" class="ob l" onclick="override(' + i + ',\'LOSS\')">✅</button>' +
          '<button type="button" class="ob p" onclick="override(' + i + ',\'PENDING\')">⏳</button>' +
        '</div></div>' +
        '<div class="match-icon">' + (mw?'❌':ml?'✅':mv?'🔴':'⏳') + '</div>' +
        '</div>';
    }).join('') +
    '</div>';
  if (ipd) html += '<button type="button" class="btn-save" onclick="saveManual()">💾 Запази ръчно</button>';
  html += '<button type="button" class="btn-new-slip" onclick="resetUpload()">✕ Нов фиш</button></div>';
  el.innerHTML = html;
}

function override(i, val) {
  if (!curResult) return;
  curResult.matches[i].result = val;
  recalcResult();
  patchSlip();
  renderResult(curResult);
}

function recalcResult() {
  var ms = curResult.matches || [];
  var anyLoss = ms.some(function (m) { return m.result === 'LOSS'; });
  var allWin  = ms.length > 0 && ms.every(function (m) { return m.result === 'WIN'; });
  curResult.isProfit  = anyLoss;
  curResult.isPending = !anyLoss && !allWin;
  var s = curResult.slip || {};
  curResult.ourAmount = curResult.isPending ? 0 : curResult.isProfit ? Number(s.stake || 0) : Number(s.potentialWin || 0);
  curResult.result = curResult.isPending ? 'PENDING' : curResult.isProfit ? 'LOSS' : 'WIN';
}

function patchSlip() {
  if (!curResult || !curResult.atId) return;
  apiFetch('/api/slips/' + curResult.atId, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      tableId:   curResult.tableId,
      clientId:  curResult.clientId,
      isPending: curResult.isPending,
      isProfit:  curResult.isProfit,
      ourAmount: curResult.ourAmount
    })
  }).catch(function (e) { console.error('patch:', e.message); });
}

function saveManual() {
  recalcResult();
  patchSlip();
  loadDashboard();
  resetUpload();
}

// ── MANUAL SLIP ─────────────────────────────────────────────
function openManual() {
  if (!CLIENTS_DATA.length) return;
  var opts = CLIENTS_DATA.map(function (c) { return '<option value="' + c.id + '">' + c.name + '</option>'; }).join('');
  var today = new Date().toISOString().slice(0, 10);
  openModal('Добави фиш ръчно',
    '<div class="field"><label>Клиент</label><select id="m-cl">' + opts + '</select></div>' +
    '<div class="field"><label>Дата</label><input type="date" id="m-dt" value="' + today + '"></div>' +
    '<div class="field"><label>Мачове</label><input id="m-ms" placeholder="CAR · MTL · VGK"></div>' +
    '<div class="field"><label>Залог (лв.)</label><input type="number" id="m-st" placeholder="150"></div>' +
    '<div class="field"><label>Коефициент</label><input type="number" id="m-od" placeholder="3.81"></div>' +
    '<div class="field"><label>Резултат</label><select id="m-res"><option value="LOSS">Загубен фиш — Ние печелим</option><option value="WIN">Спечелен фиш — Ние губим</option><option value="PENDING">Изчакване</option></select></div>' +
    '<div class="field"><label>Наша сума (лв.)</label><input type="number" id="m-am" placeholder="150"></div>' +
    '<div class="modal-btns"><button type="button" class="mbtn c" onclick="closeModal()">Отказ</button><button type="button" class="mbtn p" onclick="doManual()">Запази</button></div>'
  );
}

function doManual() {
  var clientId = document.getElementById('m-cl').value;
  var slipDate = document.getElementById('m-dt').value;
  var matchText = document.getElementById('m-ms').value;
  var stake    = parseFloat(document.getElementById('m-st').value) || 0;
  var odds     = parseFloat(document.getElementById('m-od').value) || 1;
  var result   = document.getElementById('m-res').value;
  var ourAmt   = parseFloat(document.getElementById('m-am').value) || stake;
  apiFetch('/api/slips/manual', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ client_id: clientId, slip_date: slipDate, match_text: matchText, stake: stake, odds: odds, result: result, our_amount: ourAmt })
  }).then(function () { closeModal(); loadDashboard(); })
    .catch(function (e) { alert('Грешка: ' + e.message); });
}

// ── LIVE ───────────────────────────────────────────────────
function loadLive() {
  var el = document.getElementById('live-wrap');
  el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:40px">Зарежда...</div>';
  apiFetch('/api/live').then(function (data) {
    var live = data.live || [];
    if (!live.length) { el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:40px">Няма активни мачове</div>'; return; }
    el.innerHTML = live.map(function (g) {
      var isL = g.status === 'LIVE';
      return '<div class="live-card">' +
        '<div class="lc-hdr">' +
          '<div class="lc-live-badge">' + (isL ? '<div class="lc-dot"></div> НА ЖИВО' : '⏰ ПРЕДСТОЯЩ') + '</div>' +
          '<div class="lc-sport">' + g.sport + '</div>' +
        '</div>' +
        '<div class="lc-score"><div class="lc-team">' + g.away + '</div>' +
          (isL ? '<div class="lc-num">' + g.awayScore + ' : ' + g.homeScore + '</div>' : '<div style="color:rgba(255,255,255,.3)">vs</div>') +
        '<div class="lc-team" style="text-align:right">' + g.home + '</div></div></div>';
    }).join('');
  }).catch(function () { el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.25);padding:40px">Грешка</div>'; });
}

// ── HISTORY ────────────────────────────────────────────────
function loadHist() {
  var el = document.getElementById('hist-wrap');
  el.innerHTML = '';
  apiFetch('/api/clients').then(function (data) {
    el.innerHTML = data.map(function (c) {
      var bal = Number(c.balance || 0);
      return '<div class="hist-item" onclick="openClientPage(' + c.id + ')">' +
        '<div><div class="hi-name" style="color:' + c.color + '">' + c.name + '</div>' +
        '<div class="hi-sub">' + c.total_slips + ' фиша · ' + c.wins + 'W ' + c.losses + 'L</div></div>' +
        '<div><div class="hi-bal" style="color:' + balColor(bal) + '">' + fmtBal(bal) + '</div>' +
        '<div class="hi-slips">баланс</div></div>' +
        '</div>';
    }).join('') || '<div style="text-align:center;color:rgba(255,255,255,.25);padding:30px">Няма данни</div>';
  }).catch(function () {});
}

// ── INIT ───────────────────────────────────────────────────
loadDashboard();
setInterval(loadDashboard, 30000);
</script>
